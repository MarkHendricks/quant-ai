title: "Quant AI"
author: Mark Hendricks
language: en
copyright: "Mark Hendricks, 2026"
logo: _static/logo.svg
favicon: _static/favicon.svg
repository:
  url: https://github.com/MarkHendricks/quant-ai
  branch: main
  path_to_book: docs/
exclude_patterns:
- _build/**
execute:
  # shells never execute — canonical notebooks carry baked outputs
  execute_notebooks: off
sphinx:
  extra_extensions:
  - myst_nb
  - sphinx_design
  # master MathJax macro dictionary, assembled to docs/_mathjax_macros.py;
  # add course-notation OVERRIDES only under config.mathjax3_config.tex.macros
  local_extensions:
    _mathjax_macros: .
  config:
    suppress_warnings:
    - myst.header
    - pygments.lexer
    nb_remove_code_source: false
    nb_code_prompt_show: Show code
    nb_code_prompt_hide: Hide code
    html_copy_source: false
    html_show_sourcelink: false
    # Theme options set here (not top-level) so they actually bind under the
    # locked jupyter-book: the download/repository lockdown depends on it.
    html_theme_options:
      collapse_navigation: false
      show_navbar_depth: 4
      use_edit_page_button: false
      repository_url: https://github.com/MarkHendricks/quant-ai
      path_to_docs: docs/
      show_toc_level: 4
      navigation_depth: 4
      toc_title: Contents
      use_repository_button: false
      use_issues_button: false
      use_download_button: false
html_theme: pydata_sphinx_theme
html_static_path:
- _static
html_css_files:
- theme.css
- custom.css
html_js_files:
- build-stamp.js
- interactive-features.js
# Reader-facing distribution posture: the site is the deliverable; no
# repository/edit/download surfaces (assembled content is not in this repo).
# Theme options live under sphinx.config.html_theme_options above.
