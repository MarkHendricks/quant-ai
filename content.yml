# Course content manifest — quant-ai
# Items resolve from the canonical repo (../teaching-content);
# 'course/...' items are course-owned files in this repo's course/ dir
# (the namesakes: Introduction, Notation, Data Dictionary anchor).
# After ANY canonical change: push canonical, then `make pin` here —
# CI builds at content_sha, not canonical HEAD (see shell/CLAUDE.md).

content_repo: ../teaching-content
content_sha: d29fe2b5352a1abdde15cbfd36e4d2ed3f0d8215
data_dictionary: "course/discussions/0.X.1. Data Dictionary.md"

chapters:
  - title: Introduction
    items:
      - "course/discussions/0. Introduction.md"
      - "course/discussions/0. Notation.md"
    appendix:
      items:
        - "course/discussions/0.X.1. Data Dictionary.md"

